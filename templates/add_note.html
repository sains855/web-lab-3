{% extends "base.html" %}
{% block title %}Catatan Baru – EduTask{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('notes') }}" class="back-link">← Kembali ke Catatan</a>
        <h1>Catatan Baru</h1>
    </div>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('add_note') }}">
        <div class="form-group">
            <label>Judul <span class="required">*</span></label>
            <input type="text" name="title" placeholder="Contoh: Rangkuman Bab 5 – Fotosintesis" required>
        </div>
        <div class="form-group">
            <label>Isi Catatan</label>
            <textarea name="content" rows="10" placeholder="Tulis catatan pelajaranmu di sini..."></textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('notes') }}" class="btn btn-ghost">Batal</a>
            <button type="submit" class="btn btn-primary">Simpan Catatan</button>
        </div>
    </form>
</div>
{% endblock %}
