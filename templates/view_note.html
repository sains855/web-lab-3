{% extends "base.html" %}
{% block title %}{{ note.title }} – EduTask{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('notes') }}" class="back-link">← Kembali ke Catatan</a>
        <h1>{{ note.title }}</h1>
        <p class="text-muted">Dibuat: {{ note.created_at[:10] }}</p>
    </div>
    <a href="{{ url_for('delete_note', note_id=note.id) }}" class="btn btn-danger" onclick="return confirm('Hapus catatan ini?')">Hapus</a>
</div>

<div class="card note-content-card">
    <div class="note-body">{{ note.content or 'Catatan kosong.' }}</div>
</div>
{% endblock %}
